#
# Windows build of Vida Cloud desktop client. Unsigned (no EV cert yet).
# Uses aqtinstall for Qt6 + a precompiled OpenSSL distribution rather than
# upstream's Craft framework — faster, simpler, no Sparkle. We add signing
# + the NSIS installer chrome once an EV cert is in place.
#
# Output: vidacloud-<sha>-windows-x64.zip (portable build) as artifact.
name: Build Vida Cloud Windows ZIP (unsigned)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  windows:
    name: Windows ZIP (unsigned)
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install Qt 6.8.0
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat qtshadertools qtwebsockets qtwebchannel'

      - name: Set up MSVC env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Use pre-installed OpenSSL on windows-2022
        shell: pwsh
        run: |
          # GitHub's windows-2022 image ships with OpenSSL at C:\Program Files\OpenSSL\.
          # Don't install via choco — that pins to a specific version that 404s on slproweb.
          if (-not (Test-Path "C:\Program Files\OpenSSL\bin\openssl.exe")) {
            Write-Host "Pre-installed OpenSSL not found, falling back to choco"
            choco install openssl --no-progress -y
          }
          echo "OPENSSL_ROOT_DIR=C:/Program Files/OpenSSL" >> $env:GITHUB_ENV
          & "C:\Program Files\OpenSSL\bin\openssl.exe" version

      - name: Install ECM + Inkscape
        shell: pwsh
        run: |
          choco install inkscape --no-progress -y

      - name: Configure with cmake
        shell: pwsh
        run: |
          cmake -G Ninja -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_UPDATER=OFF `
            -DBUILD_TESTING=OFF `
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        shell: pwsh
        run: cmake --build build --parallel

      - name: Install + windeployqt
        shell: pwsh
        run: |
          cmake --install build
          $exe = Get-ChildItem -Path install -Filter "vidacloud.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { $exe = Get-ChildItem -Path install,build -Filter "*.exe" -Recurse | Where-Object { $_.Name -match "vidacloud" } | Select-Object -First 1 }
          if (-not $exe) { Write-Host "NO VIDACLOUD EXE FOUND"; Get-ChildItem -Path install,build -Recurse -Filter "*.exe"; exit 1 }
          Write-Host "exe=$($exe.FullName)"
          windeployqt --release --no-translations $exe.FullName

      - name: Package as ZIP
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0,7)
          Compress-Archive -Path install/* -DestinationPath "vidacloud-$sha-windows-x64.zip" -Force
          Get-ChildItem -Filter "*.zip"

      - name: Upload ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vida-cloud-windows-${{ github.run_id }}
          path: |
            *.zip
          if-no-files-found: warn
          retention-days: 30
